<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para la Maestra</title>
    <link rel="stylesheet" href="detalles.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6a1b9a">
</head>
<body>
    <div class="lluvia-utiles" id="lluvia"></div>
    <div class="tarjeta">
        <div class="decoracion-flores">🌸 🌻 🌼</div>
        <h1>¡Feliz Día, Maestra!</h1>
        <p class="nombre">MISS</p>
        <div id="caja-frases">
            <p id="frase">¿CÓMO TE SIENTES HOY MISS?</p>
        </div>
        <div class="selector-animo">
            <button onclick="mostrarFrase('inspiracion')" class="btn-insp">✨ Inspiración</button>
            <button onclick="mostrarFrase('descanso')" class="btn-desc">☕ Descanso</button>
            <button onclick="reiniciarMensaje()" class="btn-reset">🔄 Reiniciar</button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="estilo.js"></script>

</html>
